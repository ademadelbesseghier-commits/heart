<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Playlist Personnelle</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #0a1128 0%, #05050a 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Conteneur principal du lecteur */
        .player-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 191, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        /* Zone du titre en cours */
        .now-playing {
            font-size: 0.9rem;
            color: #00bfff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .track-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 1rem;
            color: #a0aec0;
            margin: 0 0 25px 0;
        }

        /* Barre de progression */
        .progress-area {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0077ff, #00d4ff);
            border-radius: 10px;
            position: relative;
            transition: width 0.1s linear;
        }
        .time-box {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 25px;
        }

        /* Boutons de contrôle */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active {
            transform: scale(0.9);
        }
        .play-pause-btn {
            background: linear-gradient(45deg, #0077ff, #00d4ff);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        /* Liste des morceaux */
        .playlist-box {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        .playlist-title {
            font-size: 1rem;
            margin: 0 0 12px 0;
            color: #a0aec0;
        }
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 5px;
            transition: background 0.2s;
        }
        .track-item:hover {
            background: rgba(0, 191, 255, 0.1);
        }
        .track-item.active {
            background: rgba(0, 119, 255, 0.2);
            border-left: 3px solid #00bfff;
        }
        .track-item-info h4 {
            margin: 0;
            font-size: 0.95rem;
        }
        .track-item-info p {
            margin: 2px 0 0 0;
            font-size: 0.8rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="now-playing">Lecture en cours</div>
        <h2 class="track-title" id="current-title">Titre du morceau</h2>
        <p class="track-artist" id="current-artist">Artiste</p>

        <audio id="main-audio" src=""></audio>

        <div class="progress-area" id="progress-area">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="time-box">
            <span id="current-time">0:00</span>
            <span id="total-duration">0:00</span>
        </div>

        <div class="controls">
            <button class="control-btn" id="prev-btn">⏮️</button>
            <button class="control-btn play-pause-btn" id="play-btn">▶️</button>
            <button class="control-btn" id="next-btn">⏭️</button>
        </div>

        <div class="playlist-box">
            <h3 class="playlist-title">Ma Liste</h3>
            <div id="playlist-tracks">
                </div>
        </div>
    </div>

    <script>
        // === 1. TA LISTE DE MUSIQUES (À MODIFIER PLUS TARD) ===
        const myTracks = [
            { name: "MILLION DOLLAR BABY", artist: "Tommy Richman", file: "track1.mp3" },
            { name: "The Box", artist: "Robby Ricch", file: "track2.mp3" },
            { name: "WE ON GO", artist: "BIA", file: "track3.mp3" }
        ];

        let trackIndex = 0;
        let isPlaying = false;

        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressArea = document.getElementById('progress-area');
        
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const currentTimeElement = document.getElementById('current-time');
        const totalDurationElement = document.getElementById('total-duration');
        const playlistTracksContainer = document.getElementById('playlist-tracks');

        // Charger une musique
        function loadTrack(index) {
            const track = myTracks[index];
            audio.src = track.file;
            currentTitle.innerText = track.name;
            currentArtist.innerText = track.artist;
            
            // Mettre à jour le style visuel de la liste
            highlightCurrentTrack();
        }

        // Générer visuellement la liste HTML
        function buildPlaylist() {
            playlistTracksContainer.innerHTML = "";
            myTracks.forEach((track, i) => {
                const div = document.createElement('div');
                div.className = `track-item ${i === trackIndex ? 'active' : ''}`;
                div.onclick = () => { selectTrack(i); };
                div.innerHTML = `
                    <div class="track-item-info">
                        <h4>${track.name}</h4>
                        <p>${track.artist}</p>
                    </div>
                `;
                playlistTracksContainer.appendChild(div);
            });
        }

        function highlightCurrentTrack() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, i) => {
                if(i === trackIndex) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        // Fonctions de lecture
        function playTrack() {
            isPlaying = true;
            playBtn.innerText = "⏸️";
            audio.play().catch(e => console.log("En attente d'interaction utilisateur..."));
        }

        function pauseTrack() {
            isPlaying = false;
            playBtn.innerText = "▶️";
            audio.pause();
        }

        function selectTrack(index) {
            trackIndex = index;
            loadTrack(trackIndex);
            playTrack();
        }

        // Événement clic bouton Play principal
        playBtn.addEventListener('click', () => {
            if (isPlaying) pauseTrack(); else playTrack();
        });

        nextBtn.addEventListener('click', () => {
            trackIndex = (trackIndex + 1) % myTracks.length;
            loadTrack(trackIndex);
            playTrack();
        });

        prevBtn.addEventListener('click', () => {
            trackIndex = (trackIndex - 1 + myTracks.length) % myTracks.length;
            loadTrack(trackIndex);
            playTrack();
        });

        // Gestion du défilement du temps
        audio.addEventListener('timeupdate', (e) => {
            const currentTime = e.target.currentTime;
            const duration = e.target.duration;
            
            if (duration) {
                // Avancée de la barre bleue
                const progressPercent = (currentTime / duration) * 100;
                progressBar.style.width = `${progressPercent}%`;

                // Affichage du texte des minutes/secondes
                let currentMins = Math.floor(currentTime / 60);
                let currentSecs = Math.floor(currentTime % 60);
                if (currentSecs < 10) currentSecs = `0${currentSecs}`;
                currentTimeElement.innerText = `${currentMins}:${currentSecs}`;
            }
        });

        // Récupérer la durée totale du fichier
        audio.addEventListener('loadeddata', () => {
            let mainDuration = audio.duration;
            let totalMins = Math.floor(mainDuration / 60);
            let totalSecs = Math.floor(mainDuration % 60);
            if (totalSecs < 10) totalSecs = `0${totalSecs}`;
            totalDurationElement.innerText = `${totalMins}:${totalSecs}`;
        });

        // Rendre la barre de progression cliquable pour avancer dans le morceau
        progressArea.addEventListener('click', (e) => {
            const coordX = e.offsetX;
            const totalWidth = progressArea.clientWidth;
            const mainDuration = audio.duration;
            
            if (mainDuration) {
                audio.currentTime = (coordX / totalWidth) * mainDuration;
                if(!isPlaying) playTrack();
            }
        });

        // Passer au morceau suivant automatiquement à la fin
        audio.addEventListener('ended', () => {
            trackIndex = (trackIndex + 1) % myTracks.length;
            loadTrack(trackIndex);
            playTrack();
        });

        // Initialisation au chargement
        window.onload = () => {
            buildPlaylist();
            loadTrack(trackIndex);
        };
    </script>
</body>
</html>
